name: 'SemVer+CalVer Release'
description: 'Compute hybrid version, tag, create GitHub release, and maintain draft changelog PR'

inputs:
  skip_release:
    description: 'Skip tag and release, only update draft PR'
    required: false
    default: 'false'

outputs:
  version:
    description: 'The computed release version'
    value: ${{ steps.version.outputs.version }}
  has_changes:
    description: 'Whether code changes were detected since the last tag'
    value: ${{ steps.changes.outputs.has_changes }}

runs:
  using: 'composite'
  steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Check for code changes since last tag
      id: changes
      shell: bash
      run: |
        # Find the most recent non-floating tag (excludes v1, v1.0 — floating major/minor tags)
        LAST_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+' | sed -n '1p' || echo "")
        echo "last_tag=$LAST_TAG" >> "$GITHUB_OUTPUT"
        if [ -z "$LAST_TAG" ]; then
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
        else
          CHANGED=$(git diff --name-only "$LAST_TAG" HEAD | grep -v -E '^(README\.md|CHANGELOG\.md|\.github/|docs/)' || true)
          if [ -n "$CHANGED" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi
        fi

    - name: Compute hybrid version
      id: version
      if: steps.changes.outputs.has_changes == 'true'
      shell: bash
      run: |
        CURRENT=$(jq -r '.version' package.json)
        BASE=$(echo "$CURRENT" | grep -oE '^[0-9]+\.[0-9]+\.[0-9]+')
        MAJOR=$(echo "$BASE" | cut -d. -f1)
        MINOR=$(echo "$BASE" | cut -d. -f2)
        PATCH=$(echo "$BASE" | cut -d. -f3)
        TODAY=$(date -u +%Y%m%d)

        BASE_VERSION="$MAJOR.$MINOR.$PATCH"

        if ! git tag -l "v$BASE_VERSION" | grep -q .; then
          VERSION="$BASE_VERSION"
        else
          CANDIDATE="$BASE_VERSION-$TODAY"
          if git tag -l "v$CANDIDATE.0" | grep -q .; then
            SUFFIX=1
            while git tag -l "v$CANDIDATE.$SUFFIX" | grep -q .; do
              SUFFIX=$((SUFFIX + 1))
            done
            VERSION="$CANDIDATE.$SUFFIX"
          else
            VERSION="$CANDIDATE.0"
          fi
        fi

        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "base_version=$BASE_VERSION" >> "$GITHUB_OUTPUT"
        echo "Computed version: $VERSION"

    - name: Install git-cliff
      if: steps.changes.outputs.has_changes == 'true'
      shell: bash
      run: npm install -g git-cliff@2

    - name: Generate release notes
      if: steps.changes.outputs.has_changes == 'true'
      id: notes
      shell: bash
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        TAG="v$VERSION"
        LAST_TAG="${{ steps.changes.outputs.last_tag }}"
        REPO="${{ github.repository }}"

        # Use repo's cliff.toml if present; otherwise fall back to the action's default
        if [ -f cliff.toml ]; then
          cp cliff.toml /tmp/cliff.toml
        else
          cp "${{ github.action_path }}/cliff.toml" /tmp/cliff.toml
        fi

        # Inject the consumer's repo URL into the config placeholder
        sed -i.bak "s|<REPO>|https://github.com/$REPO|g" /tmp/cliff.toml
        rm -f /tmp/cliff.toml.bak

        # Generate notes for this specific release
        if [ -n "$LAST_TAG" ]; then
          git-cliff --config /tmp/cliff.toml "$LAST_TAG..HEAD" --strip header --output /tmp/notes.md
        else
          git-cliff --config /tmp/cliff.toml --strip header --output /tmp/notes.md
        fi

        echo "Notes generated:"
        cat /tmp/notes.md

    - name: Tag and release
      if: steps.changes.outputs.has_changes == 'true' && inputs.skip_release != 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        TAG="v$VERSION"
        IS_CALVER=$(echo "$VERSION" | grep -q '-' && echo "true" || echo "false")

        git tag "$TAG"
        git push origin "$TAG"

        # For base releases: update floating tags so consumers get stable versions
        # For calver: skip floating tags — consumers should pin to base releases
        if [ "$IS_CALVER" != "true" ]; then
          # Update floating major version tag
          MAJOR=$(echo "$VERSION" | grep -oE '^[0-9]+')
          git tag -f "v$MAJOR"
          git push origin "v$MAJOR" --force

          # Update floating major.minor version tag
          MAJOR_MINOR=$(echo "$VERSION" | grep -oE '^[0-9]+\.[0-9]+')
          git tag -f "v$MAJOR_MINOR"
          git push origin "v$MAJOR_MINOR" --force
        fi

        # Determine release notes source
        if [ -f CHANGELOG.md ] && [ "$IS_CALVER" != "true" ]; then
          NOTES_FILE="CHANGELOG.md"
        else
          NOTES_FILE="/tmp/notes.md"
        fi

        # Calver releases are prereleases; base releases are latest stable
        if [ "$IS_CALVER" = "true" ]; then
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file "$NOTES_FILE" \
            --prerelease
        else
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file "$NOTES_FILE" \
            --latest
        fi

    - name: Update draft changelog PR
      if: steps.changes.outputs.has_changes == 'true' || inputs.skip_release == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        BASE_VERSION="${{ steps.version.outputs.base_version }}"

        # Determine changelog range start and branch name from main's package.json
        # (source of truth for what's released — the draft accumulates since last release)
        MAIN_VERSION=$(git show origin/main:package.json 2>/dev/null | jq -r '.version' || echo "0.0.0")
        MAIN_BASE=$(echo "$MAIN_VERSION" | grep -oE '^[0-9]+\.[0-9]+\.[0-9]+')
        BASE_TAG="v$MAIN_BASE"
        BRANCH="release/$BASE_TAG"
        RANGE_START="$BASE_TAG"
        IS_CALVER=$(echo "$VERSION" | grep -q '-' && echo "true" || echo "false")

        # On main: only maintain draft PR for calver releases.
        # On release branches (skip_release=true): always update draft PR.
        if [ "${{ inputs.skip_release }}" != "true" ] && [ "$IS_CALVER" != "true" ]; then
          echo "Base release — no draft PR needed"
          exit 0
        fi

        REPO="${{ github.repository }}"
        MAIN_SHA=$(git rev-parse origin/main)

        # Determine parent: branch tip if exists, otherwise main
        if git ls-remote --heads origin "$BRANCH" | grep -q "$BRANCH"; then
          PARENT_SHA=$(git rev-parse "origin/$BRANCH")
          echo "Accumulating on existing branch $BRANCH (tip: $PARENT_SHA)"
        else
          PARENT_SHA=$MAIN_SHA
          echo "Creating new branch $BRANCH from main ($PARENT_SHA)"
        fi

        # Read current package.json version from the branch (user may have bumped it)
        git show "$PARENT_SHA:package.json" > /tmp/branch_package.json 2>/dev/null || cp package.json /tmp/branch_package.json
        CURRENT_VERSION=$(jq -r '.version' /tmp/branch_package.json)

        # Re-read branch tip in case it moved while we were working
        if git ls-remote --heads origin "$BRANCH" | grep -q "$BRANCH"; then
          LATEST_PARENT_SHA=$(git rev-parse "origin/$BRANCH")
          if [ "$LATEST_PARENT_SHA" != "$PARENT_SHA" ]; then
            PARENT_SHA="$LATEST_PARENT_SHA"
            echo "Branch tip moved — re-reading from $PARENT_SHA"
            git show "$PARENT_SHA:package.json" > /tmp/branch_package.json 2>/dev/null || cp package.json /tmp/branch_package.json
            CURRENT_VERSION=$(jq -r '.version' /tmp/branch_package.json)
          fi
        fi

        # Fallback for commit message when version step didn't run
        [ -z "$VERSION" ] && VERSION="$CURRENT_VERSION"

        # For heading comparison, use main's package.json as the "base" version
        # (the release branch may have been bumped ahead by the user)
        MAIN_VERSION=$(git show origin/main:package.json 2>/dev/null | jq -r '.version' || echo "$BASE_VERSION")
        MAIN_BASE=$(echo "$MAIN_VERSION" | grep -oE '^[0-9]+\.[0-9]+\.[0-9]+')

        # Draft headings always include current UTC date when version is bumped.
        # This ensures the date stays fresh if commits are pushed days later.
        TODAY=$(date -u +%Y-%m-%d)
        if [ "$CURRENT_VERSION" != "$MAIN_BASE" ]; then
          DRAFT_HEADING="## [$CURRENT_VERSION] - $TODAY"
        else
          DRAFT_HEADING="## [calver-released]"
        fi

        # Extract user section from branch's first unreleased section
        USER_SECTION=""
        if git show "$PARENT_SHA:CHANGELOG.md" >/tmp/branch_changelog.md 2>/dev/null; then
          USER_SECTION=$(awk '
            /^## \[/ {
              section++
              # Unreleased sections have no date suffix: ## [X.Y.Z]
              if (section == 1 && $0 ~ /^## \[[^\]]+\]([[:space:]]*-[[:space:]]*[0-9]{4}-[0-9]{2}-[0-9]{2})?[[:space:]]*$/) { unreleased = 1 }
            }
            section == 1 && unreleased && /<!-- USER-EDITABLE SECTION START -->/ { found = 1 }
            section == 1 && unreleased && found { print; if (/USER-EDITABLE SECTION END/) exit }
          ' /tmp/branch_changelog.md)
        fi
        if [ -z "$USER_SECTION" ]; then
          USER_SECTION=$'<!-- USER-EDITABLE SECTION START -->\n<!-- Add your curated release notes here. -->\n<!-- USER-EDITABLE SECTION END -->'
        fi

        # Use repo's cliff.toml if present; otherwise fall back to the action's default
        if [ -f cliff.toml ]; then
          cp cliff.toml /tmp/cliff.toml
        else
          cp "${{ github.action_path }}/cliff.toml" /tmp/cliff.toml
        fi

        # Inject the consumer's repo URL into the config placeholder
        sed -i.bak "s|<REPO>|https://github.com/$REPO|g" /tmp/cliff.toml
        rm -f /tmp/cliff.toml.bak

        # Generate changelog section from main commits only (ignore any branch-only commits)
        if [ -n "$RANGE_START" ]; then
          git-cliff --config /tmp/cliff.toml "$RANGE_START..origin/main" --strip header --output /tmp/new_section.md
        else
          git-cliff --config /tmp/cliff.toml --strip header --output /tmp/new_section.md
        fi

        # Build the top draft section
        {
          echo "$DRAFT_HEADING"
          echo ""
          echo "$USER_SECTION"
          echo ""
          cat /tmp/new_section.md
        } > /tmp/top_section.md

        # Historical body comes from main (source of truth for finalized sections)
        if git show origin/main:CHANGELOG.md >/tmp/main_changelog.md 2>/dev/null; then
          # Skip header lines, keep all ## [ headings
          awk '
            BEGIN { in_header = 1 }
            /^## \[/ {
              if (in_header) { in_header = 0 }
            }
            !in_header { print }
          ' /tmp/main_changelog.md > /tmp/historical_body.md
        else
          > /tmp/historical_body.md
        fi

        # Combine: header + new draft + historical body from main
        {
          echo "# Changelog"
          echo ""
          echo "All notable changes to this project will be documented in this file."
          echo ""
          cat /tmp/top_section.md
          echo ""
          cat /tmp/historical_body.md
        } > CHANGELOG.md

        SHOULD_COMMIT=true

        # Skip commit if CHANGELOG.md is unchanged (prevents empty bot commits)
        if git show "$PARENT_SHA:CHANGELOG.md" > /tmp/existing_changelog.md 2>/dev/null; then
          if diff -q /tmp/existing_changelog.md CHANGELOG.md > /dev/null 2>&1; then
            echo "No changelog changes since last update — skipping commit"
            SHOULD_COMMIT=false
          fi
        fi

        if [ "$SHOULD_COMMIT" != "false" ]; then
          # Create blob for CHANGELOG.md
          BLOB_SHA=$(gh api "repos/$REPO/git/blobs" \
            -f content="$(base64 CHANGELOG.md | tr -d '\n')" \
            -f encoding="base64" \
            --jq '.sha')

          # Create tree (base on parent commit to preserve other branch files)
          cat > /tmp/tree.json << EOF
        {
          "base_tree": "$PARENT_SHA",
          "tree": [
            {
              "path": "CHANGELOG.md",
              "mode": "100644",
              "type": "blob",
              "sha": "$BLOB_SHA"
            }
          ]
        }
        EOF
          TREE_SHA=$(gh api "repos/$REPO/git/trees" --input /tmp/tree.json --jq '.sha')

          # Build conventional commit message for this changelog update
          LAST_TAG="${{ steps.changes.outputs.last_tag }}"
          if [ -n "$LAST_TAG" ]; then
            COMMIT_MSG="docs(changelog): changes from $LAST_TAG to v$VERSION"
          else
            COMMIT_MSG="docs(changelog): initial changelog"
          fi

          # Create commit (signed by GitHub) — accumulate on branch tip
          cat > /tmp/commit.json << EOF
        {
          "message": "$COMMIT_MSG",
          "tree": "$TREE_SHA",
          "parents": ["$PARENT_SHA"]
        }
        EOF
          COMMIT_SHA=$(gh api "repos/$REPO/git/commits" --input /tmp/commit.json --jq '.sha')

          # Create or update branch ref
          if git ls-remote --heads origin "$BRANCH" | grep -q "$BRANCH"; then
            echo "Updating branch $BRANCH to $COMMIT_SHA"
            cat > /tmp/ref.json << EOF
        {"sha": "$COMMIT_SHA", "force": true}
        EOF
            gh api "repos/$REPO/git/refs/heads/$BRANCH" -X PATCH --input /tmp/ref.json
          else
            echo "Creating branch $BRANCH at $COMMIT_SHA"
            cat > /tmp/ref.json << EOF
        {"ref": "refs/heads/$BRANCH", "sha": "$COMMIT_SHA"}
        EOF
            gh api "repos/$REPO/git/refs" --input /tmp/ref.json
          fi
        fi

        # Update PR title to match current package.json version (from branch)
        PR_NUMBER=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number')
        if [ -n "$PR_NUMBER" ] && [ "$PR_NUMBER" != "null" ]; then
          gh pr edit "$PR_NUMBER" --title "chore(release): v$CURRENT_VERSION" 2>/dev/null || true
        fi

        # Create draft PR if it doesn't exist
        PR_EXISTS=$(gh pr list --head "$BRANCH" --json number --jq 'length')
        if [ "$PR_EXISTS" = "0" ]; then
          PR_BODY=$(printf 'Accumulated changes since %s.\n\n### What to do\n\n1. Edit the `[calver-released]` section in CHANGELOG.md to curate release notes\n2. Bump `package.json` version when ready for the next base release\n3. Merge this PR to trigger the release\n\n> **Validation not appearing?** If the `validate` status check is stuck on "Expected", click **"Update branch"** to trigger it. Bot commits do not trigger workflows automatically.' "$BASE_TAG")
          if ! gh pr create \
            --head "$BRANCH" \
            --base main \
            --title "chore(release): v$CURRENT_VERSION" \
            --body "$PR_BODY" \
            --draft 2>/tmp/pr_error; then
            ERROR=$(cat /tmp/pr_error)
            if echo "$ERROR" | grep -q "not permitted to create or approve pull requests"; then
              echo "::warning::GitHub Actions cannot create PRs with the default token."
              echo "::warning::To enable auto-PR creation, go to Settings > Actions > General and enable 'Allow GitHub Actions to create and approve pull requests'"
              echo "::warning::Or create the PR manually: https://github.com/${{ github.repository }}/compare/main...$BRANCH"
            else
              echo "::warning::Could not create PR: $ERROR"
            fi
          fi
        fi
