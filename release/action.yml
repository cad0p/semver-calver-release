name: 'SemVer+CalVer Release'
description: 'Compute hybrid version, tag, create GitHub release, and manage CHANGELOG.md'

outputs:
  version:
    description: 'The computed release version'
    value: ${{ steps.version.outputs.version }}
  has_changes:
    description: 'Whether code changes were detected since the last tag'
    value: ${{ steps.changes.outputs.has_changes }}

runs:
  using: 'composite'
  steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Check for code changes since last tag
      id: changes
      shell: bash
      run: |
        LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
        if [ -z "$LAST_TAG" ]; then
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
        else
          CHANGED=$(git diff --name-only "$LAST_TAG" HEAD | grep -v -E '^(README\.md|CHANGELOG\.md|\.github/|docs/)' || true)
          if [ -n "$CHANGED" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi
        fi

    - name: Compute hybrid version
      id: version
      if: steps.changes.outputs.has_changes == 'true'
      shell: bash
      run: |
        CURRENT=$(jq -r '.version' package.json)
        BASE=$(echo "$CURRENT" | grep -oE '^[0-9]+\.[0-9]+\.[0-9]+')
        MAJOR=$(echo "$BASE" | cut -d. -f1)
        MINOR=$(echo "$BASE" | cut -d. -f2)
        PATCH=$(echo "$BASE" | cut -d. -f3)
        TODAY=$(date -u +%Y%m%d)

        BASE_VERSION="$MAJOR.$MINOR.$PATCH"

        if ! git tag -l "v$BASE_VERSION" | grep -q .; then
          VERSION="$BASE_VERSION"
        else
          CANDIDATE="$BASE_VERSION-$TODAY"
          if git tag -l "v$CANDIDATE.0" | grep -q .; then
            SUFFIX=1
            while git tag -l "v$CANDIDATE.$SUFFIX" | grep -q .; do
              SUFFIX=$((SUFFIX + 1))
            done
            VERSION="$CANDIDATE.$SUFFIX"
          else
            VERSION="$CANDIDATE.0"
          fi
        fi

        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "Computed version: $VERSION"

    - name: Generate changelog notes
      if: steps.changes.outputs.has_changes == 'true'
      id: changelog
      shell: bash
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        TAG="v$VERSION"
        IS_CALVER=$(echo "$VERSION" | grep -q '-' && echo "true" || echo "false")
        LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
        RANGE="${LAST_TAG}..HEAD"
        [ -z "$LAST_TAG" ] && RANGE="HEAD"

        # Generate notes from conventional commits since last tag
        {
          FEATS=$(git log "$RANGE" --grep='^feat' --pretty='format:- %s (%h)' || true)
          FIXES=$(git log "$RANGE" --grep='^fix' --pretty='format:- %s (%h)' || true)
          DOCS=$(git log "$RANGE" --grep='^docs' --pretty='format:- %s (%h)' || true)
          BREAKING=$(git log "$RANGE" --grep='BREAKING CHANGE' --pretty='format:- %s (%h)' || true)
          OTHER=$(git log "$RANGE" --grep='^\(feat\|fix\|docs\|chore\|test\|style\|refactor\)' --invert-grep --pretty='format:- %s (%h)' || true)

          [ -n "$FEATS" ] && { echo "### Features"; echo "$FEATS"; echo ""; }
          [ -n "$FIXES" ] && { echo "### Bug Fixes"; echo "$FIXES"; echo ""; }
          [ -n "$DOCS" ] && { echo "### Documentation"; echo "$DOCS"; echo ""; }
          [ -n "$BREAKING" ] && { echo "### BREAKING CHANGES"; echo "$BREAKING"; echo ""; }
          [ -n "$OTHER" ] && { echo "### Other Changes"; echo "$OTHER"; echo ""; }
        } > /tmp/notes.md

    - name: Tag and release
      if: steps.changes.outputs.has_changes == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        TAG="v$VERSION"

        # Tag the triggering commit (before any CHANGELOG.md commit)
        git tag "$TAG"
        git push origin "$TAG"

        # Update floating major version tag (e.g. v1) so consumers can use @v1
        MAJOR=$(echo "$VERSION" | grep -oE '^[0-9]+')
        MAJOR_TAG="v$MAJOR"
        git tag -f "$MAJOR_TAG"
        git push origin "$MAJOR_TAG" --force

        # Update floating major.minor version tag (e.g. v1.0) so consumers can use @v1.0
        MAJOR_MINOR=$(echo "$VERSION" | grep -oE '^[0-9]+\.[0-9]+')
        MAJOR_MINOR_TAG="v$MAJOR_MINOR"
        git tag -f "$MAJOR_MINOR_TAG"
        git push origin "$MAJOR_MINOR_TAG" --force

        gh release create "$TAG" \
          --title "$TAG" \
          --notes-file /tmp/notes.md \
          --latest

    - name: Update CHANGELOG.md
      if: steps.changes.outputs.has_changes == 'true'
      shell: bash
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        TAG="v$VERSION"
        IS_CALVER=$(echo "$VERSION" | grep -q '-' && echo "true" || echo "false")

        # For calver releases: auto-append to CHANGELOG.md
        # For base releases: only auto-append if user did NOT manually edit package.json
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git config user.name "github-actions[bot]"

        if [ "$IS_CALVER" = "true" ]; then
          echo "Calver release — auto-updating CHANGELOG.md"
          cat /tmp/notes.md >> CHANGELOG.md
          git add CHANGELOG.md
          git commit -m "docs: update CHANGELOG.md for $TAG [skip ci]" || true
          git push origin HEAD:main || echo "::warning::Could not push CHANGELOG.md to main (branch protection?)"
        elif ! git log -1 --name-only --pretty=format: | grep -q '^package\.json$'; then
          echo "Base release without package.json change — auto-updating CHANGELOG.md"
          cat /tmp/notes.md >> CHANGELOG.md
          git add CHANGELOG.md
          git commit -m "docs: update CHANGELOG.md for $TAG [skip ci]" || true
          git push origin HEAD:main || echo "::warning::Could not push CHANGELOG.md to main (branch protection?)"
        else
          echo "Base release with package.json change — trusting user's CHANGELOG.md"
        fi
