name: 'SemVer+CalVer Release'
description: 'Compute hybrid version, tag, create GitHub release, and maintain draft changelog PR'

outputs:
  version:
    description: 'The computed release version'
    value: ${{ steps.version.outputs.version }}
  has_changes:
    description: 'Whether code changes were detected since the last tag'
    value: ${{ steps.changes.outputs.has_changes }}

runs:
  using: 'composite'
  steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Check for code changes since last tag
      id: changes
      shell: bash
      run: |
        LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
        if [ -z "$LAST_TAG" ]; then
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
        else
          CHANGED=$(git diff --name-only "$LAST_TAG" HEAD | grep -v -E '^(README\.md|CHANGELOG\.md|\.github/|docs/)' || true)
          if [ -n "$CHANGED" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi
        fi

    - name: Compute hybrid version
      id: version
      if: steps.changes.outputs.has_changes == 'true'
      shell: bash
      run: |
        CURRENT=$(jq -r '.version' package.json)
        BASE=$(echo "$CURRENT" | grep -oE '^[0-9]+\.[0-9]+\.[0-9]+')
        MAJOR=$(echo "$BASE" | cut -d. -f1)
        MINOR=$(echo "$BASE" | cut -d. -f2)
        PATCH=$(echo "$BASE" | cut -d. -f3)
        TODAY=$(date -u +%Y%m%d)

        BASE_VERSION="$MAJOR.$MINOR.$PATCH"

        if ! git tag -l "v$BASE_VERSION" | grep -q .; then
          VERSION="$BASE_VERSION"
        else
          CANDIDATE="$BASE_VERSION-$TODAY"
          if git tag -l "v$CANDIDATE.0" | grep -q .; then
            SUFFIX=1
            while git tag -l "v$CANDIDATE.$SUFFIX" | grep -q .; do
              SUFFIX=$((SUFFIX + 1))
            done
            VERSION="$CANDIDATE.$SUFFIX"
          else
            VERSION="$CANDIDATE.0"
          fi
        fi

        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "base_version=$BASE_VERSION" >> "$GITHUB_OUTPUT"
        echo "Computed version: $VERSION"

    - name: Install git-cliff
      if: steps.changes.outputs.has_changes == 'true'
      shell: bash
      run: npm install -g git-cliff

    - name: Generate release notes
      if: steps.changes.outputs.has_changes == 'true'
      id: notes
      shell: bash
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        TAG="v$VERSION"
        LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

        # Generate notes for this specific release
        if [ -n "$LAST_TAG" ]; then
          git-cliff "$LAST_TAG..HEAD" --strip header --output /tmp/notes.md
        else
          git-cliff --strip header --output /tmp/notes.md
        fi

        echo "Notes generated:"
        cat /tmp/notes.md

    - name: Tag and release
      if: steps.changes.outputs.has_changes == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        TAG="v$VERSION"
        IS_CALVER=$(echo "$VERSION" | grep -q '-' && echo "true" || echo "false")

        git tag "$TAG"
        git push origin "$TAG"

        # Update floating major version tag
        MAJOR=$(echo "$VERSION" | grep -oE '^[0-9]+')
        git tag -f "v$MAJOR"
        git push origin "v$MAJOR" --force

        # Update floating major.minor version tag
        MAJOR_MINOR=$(echo "$VERSION" | grep -oE '^[0-9]+\.[0-9]+')
        git tag -f "v$MAJOR_MINOR"
        git push origin "v$MAJOR_MINOR" --force

        # For base releases: use curated CHANGELOG.md if available
        # For calver: use git-cliff generated notes
        if [ "$IS_CALVER" = "true" ] || [ ! -f CHANGELOG.md ]; then
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file /tmp/notes.md \
            --latest
        else
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file CHANGELOG.md \
            --latest
        fi

    - name: Update draft changelog PR
      if: steps.changes.outputs.has_changes == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        BASE_VERSION="${{ steps.version.outputs.base_version }}"
        BASE_TAG="v$BASE_VERSION"
        BRANCH="release/$BASE_TAG"
        IS_CALVER=$(echo "$VERSION" | grep -q '-' && echo "true" || echo "false")

        # Only maintain draft PR for calver releases (between base releases)
        if [ "$IS_CALVER" != "true" ]; then
          echo "Base release — no draft PR needed"
          exit 0
        fi

        # Create git-cliff config that ignores calver tags for a unified changelog
        cat > /tmp/cliff.toml << 'EOF'
        [changelog]
        header = "# Changelog\n\nAll notable changes to this project will be documented in this file.\n"
        trim = true

        [git]
        conventional_commits = true
        filter_unconventional = true
        tag_pattern = "^v[0-9]+\\.[0-9]+\\.[0-9]+$"
        EOF

        # Generate unified changelog since base version (calver tags ignored)
        git-cliff --config /tmp/cliff.toml "$BASE_TAG..HEAD" --output CHANGELOG.md

        # Use GitHub API to create a signed commit (like ghcommit-action)
        # This creates a commit signed by GitHub's GPG key, satisfying required_signatures
        REPO="${{ github.repository }}"
        PARENT_SHA=$(git rev-parse origin/main)

        # Create blob for CHANGELOG.md
        BLOB_SHA=$(gh api "repos/$REPO/git/blobs" \
          -f content="$(base64 -w0 CHANGELOG.md)" \
          -f encoding="base64" \
          --jq '.sha')

        # Create tree (using JSON input for nested array)
        cat > /tmp/tree.json << EOF
        {
          "base_tree": "$PARENT_SHA",
          "tree": [
            {
              "path": "CHANGELOG.md",
              "mode": "100644",
              "type": "blob",
              "sha": "$BLOB_SHA"
            }
          ]
        }
        EOF
        TREE_SHA=$(gh api "repos/$REPO/git/trees" --input /tmp/tree.json --jq '.sha')

        # Create commit (signed by GitHub)
        cat > /tmp/commit.json << EOF
        {
          "message": "docs: update CHANGELOG.md for upcoming $BASE_TAG release",
          "tree": "$TREE_SHA",
          "parents": ["$PARENT_SHA"]
        }
        EOF
        COMMIT_SHA=$(gh api "repos/$REPO/git/commits" --input /tmp/commit.json --jq '.sha')

        # Create or update branch ref
        if git ls-remote --heads origin "$BRANCH" | grep -q "$BRANCH"; then
          echo "Updating branch $BRANCH to $COMMIT_SHA"
          gh api "repos/$REPO/git/refs/heads/$BRANCH" -X PATCH -f sha="$COMMIT_SHA" -f force=true
        else
          echo "Creating branch $BRANCH at $COMMIT_SHA"
          gh api "repos/$REPO/git/refs" -f ref="refs/heads/$BRANCH" -f sha="$COMMIT_SHA"
        fi

        # Create PR if it doesn't exist
        PR_EXISTS=$(gh pr list --head "$BRANCH" --json number --jq 'length')
        if [ "$PR_EXISTS" = "0" ]; then
          if ! gh pr create \
            --head "$BRANCH" \
            --base main \
            --title "docs: changelog for $BASE_TAG" \
            --body "Accumulated changes since $BASE_TAG. Edit CHANGELOG.md and bump package.json when ready for the next base release." 2>/tmp/pr_error; then
            ERROR=$(cat /tmp/pr_error)
            if echo "$ERROR" | grep -q "not permitted to create or approve pull requests"; then
              echo "::warning::GitHub Actions cannot create PRs with the default token."
              echo "::warning::To enable auto-PR creation, go to Settings > Actions > General and enable 'Allow GitHub Actions to create and approve pull requests'"
              echo "::warning::Or create the PR manually: https://github.com/${{ github.repository }}/compare/main...$BRANCH"
            else
              echo "::warning::Could not create PR: $ERROR"
            fi
          fi
        fi
