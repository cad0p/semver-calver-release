name: Auto Release

on:
  push:
    branches: [main, 'release/*']

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: cad0p/semver-calver-release/release@v1
        with:
          skip_release: ${{ github.ref != 'refs/heads/main' }}
