name: 'Validate Release PR'
description: 'Ensure package.json version is bumped before merging a release PR, and update PR title'

runs:
  using: 'composite'
  steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Validate version bump and update PR title
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        BRANCH="${{ github.head_ref }}"
        
        # Only validate release/* branches
        if ! echo "$BRANCH" | grep -q '^release/v'; then
          echo "Not a release branch — skipping validation"
          exit 0
        fi
        
        CURRENT_VERSION=$(jq -r '.version' package.json)
        
        # Get the last released base version from main's package.json
        MAIN_VERSION=$(git show origin/main:package.json 2>/dev/null | jq -r '.version' || echo "0.0.0")
        MAIN_BASE=$(echo "$MAIN_VERSION" | grep -oE '^[0-9]+\.[0-9]+\.[0-9]+')
        
        echo "Last released base version: $MAIN_BASE"
        echo "Current version: $CURRENT_VERSION"
        
        if [ "$CURRENT_VERSION" = "$MAIN_BASE" ]; then
          echo "::error::package.json version ($CURRENT_VERSION) must be bumped from the last released base version ($MAIN_BASE)"
          echo "::error::Edit package.json to set the next release version before merging"
          exit 1
        fi
        
        echo "Version bumped: $MAIN_BASE → $CURRENT_VERSION"
        
        # Prevent code changes from being hidden in release PRs
        UNEXPECTED=$(git diff --name-only origin/main...HEAD | grep -v -E '^(package\.json|package-lock\.json|yarn\.lock|pnpm-lock\.yaml|CHANGELOG\.md)$' || true)
        if [ -n "$UNEXPECTED" ]; then
          echo "::error::Release PR contains unexpected files: $UNEXPECTED"
          echo "::error::Only package.json, lockfiles, and CHANGELOG.md should change on release branches"
          exit 1
        fi
        
        # Update PR title to match current version
        PR_NUMBER="${{ github.event.pull_request.number }}"
        if [ -n "$PR_NUMBER" ]; then
          gh pr edit "$PR_NUMBER" --title "chore(release): v$CURRENT_VERSION" 2>/dev/null || true
          echo "Updated PR title to: chore(release): v$CURRENT_VERSION"
        fi
