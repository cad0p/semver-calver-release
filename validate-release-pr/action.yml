name: 'Validate Release PR'
description: 'Ensure package.json version is bumped before merging a release PR, and update PR title'

runs:
  using: 'composite'
  steps:
    - uses: actions/checkout@v6

    - name: Validate version bump and update PR title
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        BRANCH="${{ github.head_ref }}"
        
        # Only validate release/* branches
        if ! echo "$BRANCH" | grep -q '^release/v'; then
          echo "Not a release branch — skipping validation"
          exit 0
        fi
        
        BASE_VERSION=$(echo "$BRANCH" | sed 's/^release\/v//')
        CURRENT_VERSION=$(jq -r '.version' package.json)
        
        echo "Base version: $BASE_VERSION"
        echo "Current version: $CURRENT_VERSION"
        
        if [ "$CURRENT_VERSION" = "$BASE_VERSION" ]; then
          echo "::error::package.json version ($CURRENT_VERSION) must be bumped from base version ($BASE_VERSION)"
          echo "::error::Edit package.json to set the next release version before merging"
          exit 1
        fi
        
        echo "Version bumped: $BASE_VERSION → $CURRENT_VERSION"
        
        # Validate CHANGELOG heading matches package.json version
        if [ -f CHANGELOG.md ]; then
          CHANGELOG_HEADING=$(grep -m1 -oE '^## \[([^]]+)\]' CHANGELOG.md | sed 's/## \[//;s/\]$//')
          if [ -n "$CHANGELOG_HEADING" ] && [ "$CHANGELOG_HEADING" != "$CURRENT_VERSION" ]; then
            echo "::error::CHANGELOG.md heading [$CHANGELOG_HEADING] does not match package.json version [$CURRENT_VERSION]"
            echo "::error::Rename the top section heading in CHANGELOG.md to match the bumped version"
            exit 1
          fi
          echo "CHANGELOG heading validated: [$CHANGELOG_HEADING]"
        fi
        
        # Update PR title to match current version
        PR_NUMBER="${{ github.event.pull_request.number }}"
        if [ -n "$PR_NUMBER" ]; then
          gh pr edit "$PR_NUMBER" --title "chore(release): v$CURRENT_VERSION" 2>/dev/null || true
          echo "Updated PR title to: chore(release): v$CURRENT_VERSION"
        fi
