name: 'Validate Package Version'
description: 'Prevent accidental package.json version changes on feature branches; validate format on release branches'

inputs:
  base-branch:
    description: 'Branch to compare package.json version against'
    required: false
    default: 'main'

runs:
  using: 'composite'
  steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Validate package version
      shell: bash
      run: |
        BRANCH="${{ github.head_ref || github.ref_name }}"
        BASE_BRANCH="${{ inputs.base-branch }}"

        if [ -z "$BRANCH" ]; then
          echo "::error::Unable to determine branch name. This action is designed for pull_request or push events."
          exit 1
        fi

        if [ ! -f package.json ]; then
          echo "::error::package.json not found in the workspace"
          exit 1
        fi

        CURRENT_VERSION=$(jq -r '.version // empty' package.json)
        if [ -z "$CURRENT_VERSION" ] || [ "$CURRENT_VERSION" = "null" ]; then
          echo "::error::package.json is missing a 'version' field"
          exit 1
        fi

        echo "Current version: $CURRENT_VERSION"
        echo "Branch: $BRANCH"

        # Base SemVer: MAJOR.MINOR.PATCH
        # Prerelease: MAJOR.MINOR.PATCH-YYYYMMDD.N (for same-day releases)
        if ! echo "$CURRENT_VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9]{8}\.[0-9]+)?$'; then
          echo "::error::Version '$CURRENT_VERSION' is not valid (expected MAJOR.MINOR.PATCH or MAJOR.MINOR.PATCH-YYYYMMDD.N, e.g. 1.0.0, 1.0.0-20260429.0)"
          exit 1
        fi

        # On release branches: format check only (version bump is allowed and expected)
        if echo "$BRANCH" | grep -q '^release/v'; then
          echo "Release branch — version format OK: $CURRENT_VERSION"
          exit 0
        fi

        # On non-release branches: version must not change from base branch
        BASE_VERSION=$(git show "origin/$BASE_BRANCH:package.json" 2>/dev/null | jq -r '.version // empty' || echo "")
        if [ -z "$BASE_VERSION" ]; then
          echo "::error::Could not read version from origin/$BASE_BRANCH:package.json"
          exit 1
        fi

        if [ "$CURRENT_VERSION" != "$BASE_VERSION" ]; then
          echo "::error::package.json version changed from '$BASE_VERSION' to '$CURRENT_VERSION' on a non-release branch"
          echo "::error::Version bumps must be done on a release/v* branch"
          exit 1
        fi

        echo "Version unchanged from $BASE_BRANCH: $CURRENT_VERSION"
